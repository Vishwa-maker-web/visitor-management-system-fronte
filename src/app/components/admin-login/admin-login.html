<div class="login-container">

  <div class="login-card">

    <h1>Admin Login</h1>
    <p>Authorized Personnel Only</p>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button (click)="login()">
      Login
    </button>

  </div>

</div>
